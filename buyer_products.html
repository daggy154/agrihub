<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Products - AgriHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .products-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 20px 40px 20px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
            margin-top: 30px;
        }
        
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
        }
        
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #f5f5f5;
            display: block;
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--primary-green);
            margin-bottom: 10px;
        }
        
        .product-category {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 10px;
        }
        
        .product-quantity {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .product-description {
            color: #444;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        
        .btn-buy {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn-buy:hover {
            background-color: #2c4232;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #666;
        }
        
        .no-products {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .nav-bar {
            background-color: var(--primary-green);
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }
        
        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }
        @media (max-width: 1200px){
            .products-grid{
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 992px){
            .products-grid{
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px){
            .nav-bar{
                flex-direction: column;
                align-items: flex-start;
                padding: 15px;
            }
            .nav-links{
                margin-top: 10px;
            }
            .nav-links a{
                margin-left: 0;
                margin-right: 15px;
                display: inline-block;
            }
            .products-container{
                padding: 140px 15px 30px 15px;
            }
            .products-grid{
                grid-template-columns: 1fr;
            }
            .product-card{
                width: 100%;
            }
        }
        @media (max-width: 600px){
            .products-grid{
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">
            <svg viewBox="0 0 24 24" style="fill:white; width:24px; height:24px; margin-right:8px;">
                <path d="M17,8C8,10,5.9,16.17,3.82,21.34L5.71,22l1-2.3A4.49,4.49,0,0,0,8,20C19,20,22,3,22,3,21,5,14,5.25,9,6.25S2,11.5,2,13.5a6.22,6.22,0,0,0,1.75,3.75C7,13,7,9,17,8Z" />
            </svg>
            AgriHub
        </div>
        <div class="nav-links">
            <a href="buyer_dashboard.html">Home</a>
            <a href="buyer_products.html">Products</a>
            <a href="index.html">Logout</a>
        </div>
    </div>
    
    <div class="products-container">
        <h1 style="font-family: 'Playfair Display', serif; color: var(--primary-green);">Fresh Products from Farmers</h1>
        
        <div id="productsGrid" class="products-grid">
            <!-- Products will be loaded here -->
        </div>
    </div>
    
    <script>
        const API = "http://localhost:3000";
        
        async function loadProducts() {
            const productsGrid = document.getElementById('productsGrid');
            productsGrid.innerHTML = '<div class="loading">Loading products...</div>';
            
            try {
                const response = await fetch(API + '/api/products');
                const products = await response.json();
                
                if (products.length === 0) {
                    productsGrid.innerHTML = '<div class="no-products">No products available yet.</div>';
                    return;
                }
                
                /* Locate this section inside your loadProducts() function */

            productsGrid.innerHTML = products.map(product => {
                // 1. Calculate the 10% increase here
                const displayPrice = parseFloat(product.price) * 1.10; 

                // 2. Return the HTML string using the new displayPrice
                return `
                    <div class="product-card">
                        <img class="product-image" 
                            src="${product.image_url || 'https://via.placeholder.com/300x200?text=No+Image'}" 
                            alt="${product.name}"
                            onerror="this.src='https://via.placeholder.com/300x200?text=Image+Not+Found'">
                        <div class="product-info">
                            <h3 class="product-name">${product.name}</h3>
                            <div class="product-category">${product.category}</div>
                            
                            <div class="product-price">Ksh ${displayPrice.toFixed(2)} per kg</div>
                            
                            <div class="product-quantity">Available: ${product.quantity} kg</div>
                            <div style="color: var(--primary-green); font-size: 0.9rem; margin-bottom: 10px;">
                                <strong>Farmer:</strong> ${product.farmer_name || 'Unknown'}
                            </div>
                            <p class="product-description">${product.description}</p>
                            
                            <button class="btn-buy" onclick="buyProduct(${product.id}, ${displayPrice})">Add to Cart</button>
                        </div>
                    </div>
                `;
            }).join(''); // Don't forget the .join('') at the end!
                
            } catch (error) {
                console.error('Error loading products:', error);
                productsGrid.innerHTML = '<div class="no-products">Error loading products. Please try again.</div>';
            }
        }
        
        function buyProduct(productId, displayedPrice) {
            // displayedPrice is the 110% value passed from the button
            fetch("http://localhost:3000/buy-product", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json" // Fixed 'TYPE' to 'Type'
                },
                body: JSON.stringify({
                    product_id: productId,
                    buyer_id: localStorage.getItem("user_id"),
                    total_price: displayedPrice // Send the price the buyer actually sees
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.message === "Purchase successful") {
                    alert(`Success!\nBase Price: Ksh ${data.base_price}\nTariff (10%): Ksh ${data.tariff}\nTotal Paid: Ksh ${data.total_price}`);
                } else {
                    alert("Error: " + data.message);
                }
            })
            .catch(err => console.error("Error:", err));
        }
        
        // Load products when page loads
        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
</body>
</html>
