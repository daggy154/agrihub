<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - AgriHub</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="index.css">
    <style>
        .products-table {
            width: 100%;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            overflow-x: auto;
        }
        
        .products-table table {
            width: 100%;
            border-collapse: collapse;
            min-width: 750px;
        }
        
        .products-table th {
            background: var(--primary-green);
            color: white;
            padding: 15px;
            text-align: left;
            position: sticky;
            top: 0;
        }
        
        .products-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .products-table tr:hover {
            background: #f9f9f9;
        }
        .products-table::-webkit-scrollbar{
            height: 8px;
        }
        .products-table::-webkit-scrollbar-thumb{
            background: var(--accent-green);
            border-radius: 10px;
        }
        .product-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body class="dashboard-bg">
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="logo">
                <svg viewBox="0 0 24 24" style="fill:white; width:24px; height:24px; margin-right:8px;">
                    <path d="M17,8C8,10,5.9,16.17,3.82,21.34L5.71,22l1-2.3A4.49,4.49,0,0,0,8,20C19,20,22,3,22,3,21,5,14,5.25,9,6.25S2,11.5,2,13.5a6.22,6.22,0,0,0,1.75,3.75C7,13,7,9,17,8Z" />
                </svg>
                AgriHub
            </div>
            <a href="farmer_dashboard.html" class="menu-item">Add Product</a>
            <a href="my-products.html" class="menu-item active">My Products</a>
            <a href="#" class="menu-item">Orders Received</a>
            <a href="#" class="menu-item">Settings</a>
            <a href="index.html" class="menu-item" style="margin-top: auto; border:none; color: #ffadad;">Logout</a>
        </div>
        
        <div class="dashboard-content">
            <div class="dash-header">
                <h2>My Products</h2>
                <div class="user-profile">
                    <span id="farmerNameDisplay" style="font-weight:700; color:var(--primary-green);"></span>
                </div>
            </div>
            
            <div class="products-table" id="productsTable">
                <table>
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Product Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Date Added</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="productsBody">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 50px;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        const API = "http://localhost:3000";
        const userData = JSON.parse(localStorage.getItem('currentUser'));
        
        if (!userData || userData.role !== 'seller') {
            alert('Please login as a farmer');
            window.location.href = 'login.html';
        }
        
        document.getElementById('farmerNameDisplay').textContent = userData.fullname;
        
        async function loadMyProducts() {
            try {
                const response = await fetch(API + '/api/products');
                const allProducts = await response.json();
                
                // Filter products for this farmer
                const myProducts = allProducts.filter(p => p.farmer_id == userData.id);
                
                const tbody = document.getElementById('productsBody');
                
                if (myProducts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 50px;">You haven\'t added any products yet.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = myProducts.map(product => `
                    <tr>
                        <td>
                            <img class="product-thumb" 
                                 src="${product.image_url || 'https://via.placeholder.com/50'}" 
                                 alt="${product.name}">
                        </td>
                        <td>${product.name}</td>
                        <td>${product.category}</td>
                        <td>$${parseFloat(product.price).toFixed(2)}</td>
                        <td>${product.quantity} kg</td>
                        <td>${new Date(product.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="delete-btn" onclick="deleteProduct(${product.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
                
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }
        
        async function deleteProduct(productId) {
            if (confirm('Are you sure you want to delete this product?')) {
                // Implement delete functionality
                alert('Delete functionality - to be implemented');
            }
        }
        
        loadMyProducts();
    </script>
</body>
</html>
